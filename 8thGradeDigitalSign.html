<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IT Office Digital Sign</title>
    <style>
        :root {
            --bg-color: #000;
            --card-bg: rgba(20, 20, 20, 0.85); 
            --matrix-green: #00ff41;
            --accent-purple: rgba(142, 68, 173, 0.9);
            --text-white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-white);
        }

        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .main-content {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            z-index: 1; /* Sits on top of canvas */
            pointer-events: none; /* Allows clicks to pass through if needed */
        }

        .title-section {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--matrix-green);
            text-shadow: 0 0 15px rgba(0, 255, 65, 0.7);
            margin-bottom: 50px;
            font-family: 'Courier New', Courier, monospace;
        }

        .container {
            display: flex;
            gap: 40px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid rgba(0, 255, 65, 0.3);
            border-radius: 15px;
            width: 450px;
            height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            backdrop-filter: blur(5px); /* Adds a modern 'glass' look */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .clock-card {
            background-color: var(--accent-purple);
            border: none;
        }

        #clock { 
            font-size: 4.5rem; 
            font-weight: bold;
            margin: 0;
        }

        #period-status { 
            font-size: 1.6rem; 
            margin-top: 10px;
            letter-spacing: 1px;
        }

        #countdown { 
            font-size: 1.1rem; 
            margin-top: 15px;
            opacity: 0.9;
            font-family: 'Courier New', Courier, monospace;
        }

        .quote-card h2 { 
            font-size: 2rem;
            padding: 30px; 
            font-style: italic; 
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="main-content">
        <div class="title-section">{ Welcome to the IT Office }</div>

        <div class="container">
            <div class="card quote-card">
                <h2>"A grateful heart is a magnet for miracles"</h2>
            </div>

            <div class="card clock-card">
                <div id="clock">00:00:00 PM</div>
                <div id="period-status">Loading Schedule...</div>
                <div id="countdown">--:-- remaining</div>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const canvas = document.getElementById('matrix-canvas');
            const ctx = canvas.getContext('2d');

            // Initialize Canvas Size
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.onresize = resize;

            // Matrix Characters
            const characters = "01010101ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄ";
            const fontSize = 16;
            const columns = Math.floor(canvas.width / fontSize);
            const drops = Array(columns).fill(1);

            function drawMatrix() {
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = "#0F0";
                ctx.font = fontSize + "px monospace";

                for (let i = 0; i < drops.length; i++) {
                    const text = characters.charAt(Math.floor(Math.random() * characters.length));
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }

            // Schedule Logic
            const schedule = [
                { name: "1st hour", start: [7,32], end: [8,31] },
                { name: "2nd hour", start: [8,35], end: [9,33] },
                { name: "3rd hour", start: [9,37], end: [10,35] },
                { name: "4th hour", start: [10,39], end: [12,15] },
                { name: "5th hour", start: [12,19], end: [13,17] },
                { name: "6th hour", start: [13,21], end: [14,19] }
            ];

            function updateTime() {
                const now = new Date();
                
                // Clock Display
                let h = now.getHours();
                const m = now.getMinutes();
                const s = now.getSeconds();
                const ampm = h >= 12 ? 'PM' : 'AM';
                const displayH = h % 12 || 12;
                document.getElementById('clock').textContent = 
                    `${displayH}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${ampm}`;

                // Period Logic
                const currentTotalSecs = (h * 3600) + (m * 60) + s;
                let status = "Out of Office Hours";
                let countText = "";

                for (let p of schedule) {
                    const sTime = (p.start[0] * 3600) + (p.start[1] * 60);
                    const eTime = (p.end[0] * 3600) + (p.end[1] * 60) + 59;

                    if (currentTotalSecs >= sTime && currentTotalSecs <= eTime) {
                        status = `It is ${p.name} now`;
                        const diff = eTime - currentTotalSecs;
                        const mins = Math.floor(diff / 60);
                        const secs = diff % 60;
                        countText = `${mins}m ${secs}s remaining`;
                        break;
                    }
                }
                document.getElementById('period-status').textContent = status;
                document.getElementById('countdown').textContent = countText;
            }

            // Set Loops
            setInterval(drawMatrix, 35);
            setInterval(updateTime, 1000);
            updateTime();
        };
    </script>
</body>
</html>
