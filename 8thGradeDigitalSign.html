<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IT Office Digital Signage</title>
    <style>
        :root {
            /default theme
            --bg-color: #000;
            --matrix-green: #00ff41;
            --header-cyan: #00f2ff;
            --accent-purple: #8e44ad;
            --card-bg: rgba(10, 10, 10, 0.95);
            --text-white: #ffffff;
            /*transition for theme changes*/
            transition: --matrix-green 3s ease, --header-cyan 3s ease, --accent-purple 3s ease;
        }
        .wide-box, .welcome-text, .box-label, #period-info, #clock {
            transition: all 3s ease-in-out;
        }
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-white);
        }
        #matrix-canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 0;
        }
        .main-content {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100%;
            z-index: 1;
            gap: 20px;
            padding-top: 60px; 
        }
        .wide-box {
            width: 85%;
            max-width: 1100px;
            background-color: var(--card-bg);
            border: 2px solid var(--matrix-green);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px rgba(0, 0, 0, 1);
            backdrop-filter: blur(12px);
            text-align: center;
        }
        .header-box {
            background-color: rgba(0, 5, 10, 0.9);
            border: 2px solid var(--header-cyan);
            min-height: 100px;
            height: auto;
            width: 90%;
            max-width: 1200px;
            padding: 20px;
            animation: pulse-glow 4s infinite ease-in-out;
        }
        .welcome-text {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--header-cyan);
            text-transform: uppercase;
            letter-spacing: 8px;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 10px #000, 0 0 20px var(--header-cyan); 
            margin: 0;
            line-height: 1.2;
        }
        @keyframes pulse-glow {
            0% { border-color: var(--header-cyan); box-shadow: 0 0 5px var(--header-cyan); }
            50% { border-color: #0088ff; box-shadow: 0 0 20px #0088ff; }
            100% { border-color: var(--header-cyan); box-shadow: 0 0 5px var(--header-cyan); }
        }
        .time-box {
            background-color: var(--accent-purple);
            border: none;
            height: 200px;
        }
        #clock {
            font-size: 7.5rem;
            font-weight: 800;
            margin: 0;
            line-height: 1;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        #period-info {
            font-size: 2.25rem;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            padding: 5px 25px;
            border-radius: 30px;
            color: var(--matrix-green);
        }
        /* CONTENT SECTIONS */
        .box-label {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--matrix-green);
            margin-bottom: 12px;
            font-weight: 900;
        }
        .content-text {
            font-size: 2.2rem;
            margin: 0;
            padding: 0 50px;
            font-weight: 600;
            line-height: 1.3;
            max-width: 90%;
            transition: opacity 0.6s ease;
        }
        .tech-box, .quote-box {
            height: auto;
            min-height: 160px;
            padding: 25px 0;
        }
        .fade-out { opacity: 0; }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    <div class="main-content">
        <div class="wide-box header-box">
            <h1 class="welcome-text">{ WELCOME TO THE IT OFFICE }</h1>
        </div>
        <div class="wide-box time-box">
            <div id="clock">00:00 PM</div>
            <div id="period-info">Initializing System...</div>
        </div>
        <div class="wide-box tech-box">
            <div class="box-label">Tech Tip:</div>
            <p id="tech-tip" class="content-text">Scanning for data...</p>
        </div>
        <div class="wide-box quote-box">
            <div class="box-label">Quotes:</div>
            <p id="quote" class="content-text">Loading motivation...</p>
        </div>
    </div>
    <script>
        const themes = [

            { name: "Cyber Sunset", purple: "#c0392b", cyan: "#f1c40f", green: "#e67e22" },

            { name: "Cyberpunk", purple: "#ff00ff", cyan: "#ffee00", green: "#00ffcc" },

        const tips = [
            // Preventative Care
            "The Pencil Trap: Never leave a pencil on your keyboard. One closure = one cracked screen.",
            "Cable Care: Pull the plug part of the charger, not the cord. Pulling the cord ruins the internal wiring.",
            "Clean Hands: Grease and crumbs are the #1 cause of 'sticky' or failing keys.",
            "No Liquids: Even a closed water bottle is a risk. Keep drinks on the floor, not the desk.",
            "Gentle Closure: You don't need to slam a laptop shut. Close it like a book you care about.",
            "Heat Check: Don't use your laptop on top of a pillow or blanket; it blocks the fans and causes overheating.",
            "Port Safety: If a USB or charger doesn't slide in easily, STOP. Forcing it can lead to further damage.",
            "Screen Protection: Do not grab the screen to move the laptop. Always hold it by the base to avoid putting stress on the hinges/display.",

            // Usage tips
            "Desktop Cleanliness: A messy desktop makes your computer work harder to load. Organize your files!",
            "Search Pro: Use quotes in Google (like \"Tulsa History\") to find that exact phrase only.",
            "To Screenshot: Win + Shift + S lets you snip a specific part of the screen, not the whole thing.",
            "Bookmark Bar: Use Ctrl + D to save your most used school sites so you don't have to type them daily.",
            "Mute Shortcut: Most Chromebooks/PCs have a dedicated mute key—learn where it is for emergencies!",

            // General Cleanup 
            "Log Out: Always log out of your computer. Don't let others 'prank' you, which can get you in trouble.",
            "File Naming: 'Document1' is a bad name. Use 'Science_Project_v1' so you can actually find it later.",
            "Sync Check: Make sure your One Drive is syncing before you close your lid, or you might lose work. There should be a blue cloud icon in the taskbar.",
            "Update Now: When you see a system update, do it! It usually contains security fixes to keep you safe. Your computer may also freeze if you ignore updates for too long.",
            "Brightness Balance: Lowering your screen brightness can dramatically increase your battery life during the day.",
            "Cloud Storage: Save everything to your OneDrive, not the 'Downloads' folder. Downloads are not backed up by your OneDrive."
        ];
        const quotes = [
            //Movies Quotes

            "\"A wise man can learn more from his enemies than a fool from his friends.\" - Nassim Nicholas Taleb",
            "\"Do, or do not, there is no try.\" - Yoda, Star Wars", 
            "\"Every man dies, but not every man really lives.\" - William Wallace, Braveheart",
            "\"Don't let anyone ever make you feel like you don't deserve what you want.\" - Heath Ledger in 10 Things I Hate About You",
            "\"Great men are not born great, they grow great.\" - Mario Puzo, The Godfather",
            "\"It's what you do right now that makes a difference.\" - Struecker in Black Hawk Down",
            "\"Just because someone stumbles and loses their path, doesn't mean they're lost forever.\" - Professor X, X-men: Days of Future Past",
            "\"Life is not the amount of breaths you take, it's the moments that take your breath away.\" - Will Smith in Hitch",
            "\"Life moves pretty fast. If you don't stop and look around once in a while, you could miss it.\" - Ferris Bueller's Day Off",
            "\"Nobody is gonna hit as hard as life. But it ain't about how hard you can hit. It's about how hard you can get hit and keep moving forward.\" - Rocky Balboa",
            "\"Our lives are defined by opportunities, even the ones we miss.\" - F. Scott Fitzgerald",
            "\"Sometimes it is the people who no one imagines anything of who do the things that no one can imagine.\" - Alan Turing",
            "\"There should be no boundaries to human endeavor. We are all different. However bad life may seem, there is always something you can do and succeed at.\" - Stephen Hawking",
            "\"To find something, anything, a great truth or a lost pair of glasses, you must first believe that there is some advantage of finding it.\" - Jack Burden in All the King's Men",
            "\"We can't retract the decisions we've made. We can only affect the decisions we're going to make from here.\" - Nick Rice in Law Abiding Citizen",
            "\"Yes, the past can hurt. But you can either run from it, or learn from it.\" - Rafiki in The Lion King",
            "\"When life gets you down, do you wanna know what you've gotta do? Just keep swimming!\" - Dory in Finding Nemo",
            "\"The flower that blooms in adversity is the most rare and beautiful of all.\" - The Emperor in Mulan", 
            "\"Do not be fooled by its appearance. Like so many things, it is not what is outside, but what is inside that counts.\" - Merchant in Aladdin",   
            "\"Having dreams is what makes life tolerable.\" - Pete in Rudy",   
            "\"Real loss is only possible when you love something more than you love yourself.\" - Sean Maguire in Good Will Hunting",
            "\"The more things change, the more they stay the same.\" - Celie in The Color Purple",
             "\"It is not our abilities that show what we truly are… it is our choices.\" - Albus Dumbledore, Harry Potter and the Chamber of Secrets",
            "\"O great computer, the task we have designed you to perform is this. We want you to tell us the answer. -The answer? The answer to what? -Life! -The Universe! -Everything!\" - Douglas Adams, The Hitchhiker's Guide to the Galaxy",
            "\"The world isn't run by weapons anymore, or energy, or money. It’s run by little ones and zeros, little bits of data.\" - Ben Kingsley in Sneakers",

            "\"If it's in the computer, they believe anything.\" - Gabby Hoffman in Sleepless in Seattle",

            //Books Quotes
            "\"You never know what worse luck your bad luck has saved you from.\" - Cormac McCarthy, No Country for Old Men",

            "\"Just remember that the things you put into your head are there forever, he said. You might want to think about that.\" - Cormac McCarthy, The Road,",
            "\"This is what the good guys do. They keep trying. They don't give up.\" - Cormac McCarthy, The Road",
            "\"Human beings have a remarkable ability to accept the abnormal and make it normal.\" - Andy Weir, Project Hail Mary",
            "\"I penetrated the outer cell membrane with a nanosyringe.\"\"You poked it with a stick?\" \"No!\" I said. \"Well. Yes. But it was a scientific poke with a very scientific stick.\" - Andy Weir, Project Hail Mary",
            "\"Work fast.\" \"Yeah.\" I point at the screen. \"First I have to wait for my computer to wake up.\" \"Hurry.\" \"Okay, I'll wait faster.\" \"Sarcasm.\" - Andy Weir, Project Hail Mary",
            "\"When stupid ideas work, they become genius ideas.\" - Andy Weir, Project Hail Mary",
            "\"I’m smart enough now to know I’m stupid. That’s progress.\" - Andy Weir, Project Hail Mary",
            "\"Got to love computers. They do all the thinking for you so you don’t have to.\" - Andy Weir, Project Hail Mary",
            "\"Maybe it’s just the childish optimist in me, but humanity can be pretty impressive when we put our minds to it.\" - Andy Weir, Project Hail Mary",
            "\"People nowadays…they have no idea how good they have it. The past was unrelenting misery for most people. And the further back in time you go, the worse it was.\" - Andy Weir, Project Hail Mary",
            "\"Because what’s the point of even having a world if you’re not going to pass it on to the next generation?\" - Andy Weir, Project Hail Mary",
            "\"Never let the future disturb you. You will meet it, if you have to, with the same weapons of reason which today arm you against the present.\" - Marcus Aurelius, Meditations",
            "\"It is the power of the mind to be unconquerable.\" - Seneca, The Stoic Philosophy of Seneca: Essays and Letters",
            "\"Until we have begun to go without them, we fail to realize how unnecessary many things are. We've been using them not because we needed them but because we had them.\" - Lucius Annaeus Seneca, Letters from a Stoic",
            "\"The things you think about determine the quality of your mind.\" - Marcus Aurelius, Meditations",
            "\"It is not the man who has too little that is poor, but the one who hankers after more.\" - Lucius Annaeus Seneca, Letters from a Stoic",
            "\"If what you have seems insufficient to you, then though you possess the world, you will yet be miserable.\" - Seneca, Letters from a Stoic",
            "\"And why should we feel anger at the world? As if the world would notice.\" - Marcus Aurelius, Meditations",
            "\"Life isn't about waiting for the storm to pass, it's about learning to dance in the rain.\" - Seneca",
        ];
        const schedule = [
            { name: "1st hour", start: [7,32], end: [8,31] },
            { name: "2nd hour", start: [8,35], end: [9,33] },
            { name: "3rd hour", start: [9,37], end: [10,35] },
            { name: "4th hour", start: [10,39], end: [12,15] },
            { name: "5th hour", start: [12,19], end: [13,17] },
            { name: "6th hour", start: [13,21], end: [14,19] }
        ];
        let currentThemeIndex = 0;
        function cycleTheme() {
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;
            const theme = themes[currentThemeIndex];
            document.documentElement.style.setProperty('--accent-purple', theme.purple);
            document.documentElement.style.setProperty('--header-cyan', theme.cyan);
            document.documentElement.style.setProperty('--matrix-green', theme.green);
        }
        window.onload = function() {
            const canvas = document.getElementById('matrix-canvas');
            const ctx = canvas.getContext('2d');
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.onresize = resize;
            const chars = "01010101ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿ";
        const fontSize = 24; //forntzize of the matrix characters
        const columns = Math.floor(canvas.width / fontSize);
        const drops = Array(columns).fill(1);

        function drawMatrix() {
            // Lower opacity trailing effect 
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);   
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--matrix-green');
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                if (Math.random() > 0.5) {
                    const text = chars.charAt(Math.floor(Math.random() * chars.length));
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }
        }
        function animate() {
            setTimeout(() => {
                requestAnimationFrame(animate);
                drawMatrix();
            }, 100); // delay for tv to handle it better
        }
        animate(); 
            function updateClock() {
                const now = new Date();
                let h = now.getHours();
                const m = now.getMinutes();
                const ampm = h >= 12 ? 'PM' : 'AM';
                document.getElementById('clock').textContent = `${h % 12 || 12}:${String(m).padStart(2,'0')} ${ampm}`;
                const totalSecs = (h * 3600) + (m * 60) + now.getSeconds();
                let status = "System Idle / Passing Period";
                for (let p of schedule) {
                    const sTime = (p.start[0] * 3600) + (p.start[1] * 60);
                    const eTime = (p.end[0] * 3600) + (p.end[1] * 60) + 59;
                    if (totalSecs >= sTime && totalSecs <= eTime) {
                        const diff = eTime - totalSecs;
                        status = `${p.name} | ${Math.floor(diff/60)}m ${diff%60}s left`;
                        break;
                    }
                }
                document.getElementById('period-info').textContent = status;
            }
            function cycleContent(elementId, list) {
                const el = document.getElementById(elementId);
                el.classList.add('fade-out');
                setTimeout(() => {
                    el.textContent = list[Math.floor(Math.random() * list.length)];
                    el.classList.remove('fade-out');
                }, 600);
            }
            // --- 3. SET INTERVALS ---
            setInterval(drawMatrix, 35);
            setInterval(updateClock, 1000);
            setInterval(cycleTheme, 120000); // 2 Minute between color change
            setInterval(() => cycleContent('tech-tip', tips), 60000); // 1 Min Tip Cycle
            setInterval(() => cycleContent('quote', quotes), 60000); // 1 Min Quote Cycle
            updateClock();
            cycleContent('tech-tip', tips);
            cycleContent('quote', quotes);
        };
    </script>
</body>
</html>
